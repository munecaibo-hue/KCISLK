name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 或 master，根據您的預設分支而定
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 由於專案在 gacha-machine 資料夾內，我們設定預設的工作目錄
    defaults:
      run:
        working-directory: ./gacha-machine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './gacha-machine/package-lock.json'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Build project
        env:
          VITE_GOOGLE_APP_SCRIPT_URL: https://script.google.com/macros/s/AKfycbwYNZufAdxwLKWfaXaLXaqwVXSDYaDAaNHuITme46AjxgpXCHRPepxsou1sYE7RyAYN/exec
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gacha-machine/dist' # 必須指向打包後的資料夾

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
